<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中学理科クイズ 200問</title>
  <style>
    :root {
      --sky1: #5fc2f2;
      --sky2: #d8efff;
      --navy: #12263a;
      --navy2: #0b1d2d;
      --blue: #0a63b7;
      --red: #e9343f;
      --red2: #c51d30;
      --yellow: #ffd84a;
      --green: #26a269;
      --ink: #1f2937;
      --muted: #667085;
      --paper: #ffffff;
      --line: #d7e0ea;
      --shadow: 0 18px 40px rgba(3, 31, 52, 0.22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 20%, rgba(255,255,255,.65), transparent 9%),
        radial-gradient(circle at 86% 28%, rgba(255,255,255,.45), transparent 12%),
        linear-gradient(180deg, var(--sky1), var(--sky2));
      overflow-x: hidden;
    }
    body::before {
      content: "⚗︎  🔬  🌱  ⚛︎  🧪  ✦  ⚡  🌙";
      position: fixed;
      inset: auto -40px 44px -40px;
      text-align: center;
      font-size: clamp(50px, 7vw, 90px);
      letter-spacing: .35em;
      color: rgba(255, 255, 255, .18);
      pointer-events: none;
      white-space: nowrap;
    }
    .app { width: min(1200px, calc(100% - 28px)); margin: 0 auto; padding-bottom: 54px; position: relative; z-index: 1; }
    header { display: grid; grid-template-columns: 1fr auto 1fr; gap: 18px; align-items: center; padding: 15px 0 18px; }
    .brand { display: flex; align-items: center; gap: 12px; color: #07375e; font-weight: 900; }
    .brand-icon { width: 52px; height: 52px; border-radius: 16px; background: #fff; display: grid; place-items: center; font-size: 28px; box-shadow: 0 10px 22px rgba(8, 52, 91, .14); }
    .brand-main { font-size: 22px; line-height: 1.05; }
    .brand-sub { margin-top: 5px; font-size: 12px; color: #315d7d; font-weight: 800; }
    .tabs { display: flex; min-width: 390px; overflow: hidden; border-radius: 18px; box-shadow: 0 10px 24px rgba(8, 52, 91, .22); }
    .tab { padding: 17px 30px; color: #fff; font-size: 19px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 9px; }
    .tab.subject { background: linear-gradient(180deg, #ef4c52, #c91d35); }
    .tab.unit { background: linear-gradient(180deg, #0b4e78, #052a49); flex: 1; }
    .status { justify-self: end; display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-radius: 18px; background: rgba(255,255,255,.93); border: 2px solid rgba(7,55,94,.08); box-shadow: 0 8px 20px rgba(10,61,98,.12); font-weight: 900; white-space: nowrap; }
    .status-item { display: flex; align-items: center; gap: 7px; }
    .status-big { font-size: 31px; line-height: 1; min-width: 42px; text-align: center; }
    #timeLeft { color: #d82432; }
    #score { color: #0a62b7; }
    .divider { width: 1px; height: 32px; background: #d6dbe1; }
    .mode-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; margin: 0 0 18px; }
    .chip { border: 0; border-radius: 999px; padding: 10px 15px; font-weight: 900; background: rgba(255,255,255,.88); color: #0a3c68; box-shadow: 0 7px 16px rgba(8,52,91,.12); cursor: pointer; }
    .chip.active { background: #0a63b7; color: #fff; }
    .select, .search-input, .form-input, .form-textarea { border: 2px solid #d7e0ea; border-radius: 14px; background: #fff; padding: 11px 12px; font-weight: 800; color: var(--ink); font-size: 15px; }
    .select { min-width: 220px; }
    .question-area { margin: 7px auto 25px; display: grid; grid-template-columns: 160px 1fr 175px; gap: 18px; align-items: end; }
    .mascot { display: flex; flex-direction: column; align-items: center; gap: 8px; user-select: none; }
    .talk { background: #fff; color: #d82432; border-radius: 999px; font-weight: 900; padding: 10px 17px; box-shadow: 0 8px 18px rgba(8,52,91,.16); }
    .talk.robot { color: #08345b; text-align: center; }
    .tako { width: 118px; height: 118px; position: relative; filter: drop-shadow(0 10px 10px rgba(0,0,0,.16)); }
    .tako .head { width: 108px; height: 86px; background: #ee5e66; border: 5px solid #151515; border-radius: 48% 48% 38% 38%; position: absolute; left: 5px; top: 10px; }
    .tako .eye { width: 16px; height: 22px; background: #111; border-radius: 999px; position: absolute; top: 42px; }
    .tako .eye.left { left: 32px; } .tako .eye.right { right: 32px; }
    .tako .mouth { width: 34px; height: 24px; border-radius: 0 0 999px 999px; background: #111; position: absolute; top: 58px; left: 42px; }
    .tako .leg { width: 28px; height: 34px; background: #ee5e66; border: 5px solid #151515; border-top: none; border-radius: 0 0 999px 999px; position: absolute; top: 80px; }
    .tako .leg.one { left: 18px; } .tako .leg.two { left: 45px; } .tako .leg.three { right: 18px; }
    .robot-face { width: 132px; height: 118px; border-radius: 32px; background: #fff; border: 5px solid #111; display: grid; place-items: center; box-shadow: 0 12px 20px rgba(0,0,0,.18); position: relative; }
    .robot-screen { width: 88px; height: 52px; background: #15293a; border-radius: 20px; color: #fff; display: grid; place-items: center; font-size: 30px; font-weight: 900; }
    .robot-face::before { content: ""; position: absolute; width: 54px; height: 22px; background: #0a62b7; border: 4px solid #111; border-radius: 20px; top: -22px; left: 39px; }
    .question-card { background: rgba(255,255,255,.96); border-radius: 30px; box-shadow: 0 16px 30px rgba(8,52,91,.18); padding: 26px 32px; display: flex; align-items: center; gap: 26px; min-height: 106px; position: relative; }
    .question-card::after { content: ""; position: absolute; right: 48px; bottom: -24px; border-left: 26px solid transparent; border-right: 8px solid transparent; border-top: 28px solid rgba(255,255,255,.96); }
    .question-number { flex: 0 0 auto; font-weight: 900; color: #23384d; font-size: 19px; border-right: 2px solid #d5dce5; padding-right: 25px; }
    .question-number strong { color: #0a62b7; font-size: 36px; margin: 0 4px; }
    .question-text { font-weight: 900; font-size: clamp(19px, 2.2vw, 27px); line-height: 1.5; }
    .quiz-panel { width: min(790px, 100%); margin: 0 auto; background: linear-gradient(180deg, rgba(255,255,255,.07), transparent), var(--navy); border: 3px solid rgba(255,255,255,.78); border-radius: 34px; box-shadow: var(--shadow); padding: 28px 34px 30px; }
    .answers { display: grid; gap: 14px; }
    .answer-btn { width: 100%; border: 0; border-radius: 999px; min-height: 64px; background: linear-gradient(180deg, #f44545, #cf2432); color: #fff; box-shadow: inset 0 2px 0 rgba(255,255,255,.35), 0 5px 0 #8e1521, 0 12px 18px rgba(0,0,0,.22); font-size: 23px; font-weight: 900; cursor: pointer; display: grid; grid-template-columns: 56px 1fr 34px; align-items: center; gap: 12px; padding: 8px 22px 12px 10px; transition: transform .12s ease, filter .12s ease, opacity .12s ease; }
    .answer-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.04); }
    .answer-btn:disabled { cursor: default; opacity: .82; }
    .answer-btn.hidden-choice { display: none; }
    .answer-btn.correct { background: linear-gradient(180deg, #31c77a, #158b51); box-shadow: inset 0 2px 0 rgba(255,255,255,.35), 0 5px 0 #0f6039, 0 12px 18px rgba(0,0,0,.22); }
    .answer-btn.wrong { background: linear-gradient(180deg, #707785, #404855); box-shadow: inset 0 2px 0 rgba(255,255,255,.22), 0 5px 0 #252a31, 0 12px 18px rgba(0,0,0,.2); }
    .choice-number { width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; background: rgba(255,255,255,.14); border: 2px solid rgba(255,255,255,.48); font-size: 23px; }
    .choice-arrow { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; background: #fff; color: #d82432; font-weight: 900; }
    .lifeline-title { color: #fff; display: flex; align-items: center; justify-content: center; gap: 14px; margin: 26px 0 15px; font-size: 20px; font-weight: 900; letter-spacing: .06em; }
    .lifeline-title::before, .lifeline-title::after { content: ""; height: 2px; flex: 1; border-top: 2px dotted rgba(255,255,255,.42); }
    .lifelines { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .lifeline-btn { min-height: 86px; border: 0; border-radius: 18px; background: linear-gradient(180deg, #ffe16c, #ffb51d); color: #1a2430; font-weight: 900; cursor: pointer; display: grid; grid-template-columns: 58px 1fr; align-items: center; gap: 12px; padding: 12px 16px; box-shadow: inset 0 2px 0 rgba(255,255,255,.55), 0 5px 0 #b87808, 0 12px 16px rgba(0,0,0,.22); }
    .lifeline-btn:disabled { opacity: .46; cursor: default; }
    .lifeline-icon { width: 52px; height: 52px; border-radius: 50%; background: #fff; display: grid; place-items: center; font-size: 25px; border: 3px solid rgba(0,0,0,.12); }
    .lifeline-main { font-size: 18px; line-height: 1.2; }
    .lifeline-sub { margin-top: 5px; font-size: 13px; color: #553600; }
    .result-box { margin-top: 21px; background: rgba(255,255,255,.94); border-radius: 20px; padding: 17px 19px; display: none; line-height: 1.7; font-weight: 800; }
    .result-box.show { display: block; }
    .result-title { font-size: 21px; margin-bottom: 4px; }
    .correct-text { color: #13824e; } .wrong-text { color: #c72432; }
    .explanation { color: #344054; font-size: 15px; font-weight: 700; }
    .bottom-actions { margin-top: 23px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .nav-btn { min-height: 60px; border-radius: 999px; border: 2px solid rgba(255,255,255,.9); font-size: 19px; font-weight: 900; cursor: pointer; transition: transform .12s ease, filter .12s ease; }
    .nav-btn:hover { transform: translateY(-2px); filter: brightness(1.03); }
    .next-btn { background: #fff; color: #0a62b7; box-shadow: 0 10px 18px rgba(0,0,0,.18); }
    .reset-btn { background: transparent; color: #fff; }
    .finish-card, .admin-card { display: none; width: min(1040px, 100%); margin: 0 auto; background: rgba(255,255,255,.96); border-radius: 32px; padding: 30px; box-shadow: var(--shadow); }
    .finish-card.show, .admin-card.show { display: block; }
    .finish-card { text-align: center; width: min(790px, 100%); }
    .finish-title { font-size: 32px; font-weight: 900; color: #08345b; margin-bottom: 12px; }
    .finish-score { font-size: 58px; font-weight: 900; color: #0a62b7; margin: 10px 0; }
    .finish-message { color: #475467; font-weight: 800; line-height: 1.8; margin-bottom: 24px; }
    .admin-head { display: flex; justify-content: space-between; gap: 16px; align-items: start; flex-wrap: wrap; border-bottom: 2px solid var(--line); padding-bottom: 18px; margin-bottom: 20px; }
    .admin-title { font-size: 25px; font-weight: 900; color: #07375e; }
    .admin-note { color: #667085; font-weight: 700; line-height: 1.7; max-width: 720px; font-size: 14px; }
    .admin-grid { display: grid; grid-template-columns: 360px 1fr; gap: 22px; align-items: start; }
    .question-list { background: #f7fbff; border: 2px solid var(--line); border-radius: 20px; padding: 14px; max-height: 610px; overflow: auto; }
    .list-meta { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; font-weight: 900; color: #315d7d; }
    .q-item { width: 100%; text-align: left; border: 2px solid transparent; background: #fff; border-radius: 14px; padding: 11px 12px; margin-bottom: 9px; cursor: pointer; font-weight: 800; color: #243447; box-shadow: 0 5px 12px rgba(7,55,94,.08); }
    .q-item small { display: block; color: #667085; margin-top: 3px; font-weight: 700; }
    .q-item.active { border-color: #0a63b7; background: #eaf5ff; }
    .editor { background: #fff; border: 2px solid var(--line); border-radius: 20px; padding: 18px; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-weight: 900; margin-bottom: 7px; color: #243447; }
    .form-input, .form-textarea, .form-select { width: 100%; }
    .form-textarea { min-height: 82px; resize: vertical; }
    .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .admin-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
    .action-btn { border: 0; border-radius: 14px; padding: 12px 16px; font-weight: 900; cursor: pointer; }
    .primary { background: #0a63b7; color: #fff; }
    .success { background: #158b51; color: #fff; }
    .danger { background: #d82432; color: #fff; }
    .light { background: #eef4fb; color: #07375e; }
    .import-area { margin-top: 18px; border-top: 2px dashed var(--line); padding-top: 16px; }
    .import-area textarea { width: 100%; min-height: 100px; }
    .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); background: #102538; color: #fff; padding: 12px 18px; border-radius: 999px; font-weight: 900; box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: opacity .2s ease; z-index: 50; }
    .toast.show { opacity: 1; }
    .contact { position: fixed; right: 24px; bottom: 22px; background: rgba(255,255,255,.94); color: #0a62b7; border: 0; border-radius: 999px; padding: 15px 21px; font-weight: 900; font-size: 15px; box-shadow: 0 12px 26px rgba(0,0,0,.2); }
    @media (max-width: 1020px) {
      header { grid-template-columns: 1fr; } .tabs, .status { justify-self: stretch; } .tabs { min-width: 0; }
      .question-area { grid-template-columns: 1fr; } .mascot { display: none; }
      .admin-grid { grid-template-columns: 1fr; } .question-list { max-height: 380px; }
    }
    @media (max-width: 650px) {
      .app { width: min(100% - 20px, 1200px); } .tab { padding: 13px 15px; font-size: 16px; }
      .status { flex-wrap: wrap; justify-content: center; } .divider { display: none; }
      .question-card { display: block; padding: 22px; } .question-number { border-right: 0; border-bottom: 2px solid #d5dce5; padding: 0 0 11px; margin-bottom: 13px; }
      .quiz-panel { padding: 22px 17px; border-radius: 26px; } .answer-btn { grid-template-columns: 46px 1fr 26px; font-size: 18px; min-height: 58px; padding-right: 13px; }
      .choice-number { width: 36px; height: 36px; } .lifelines, .bottom-actions, .choice-grid { grid-template-columns: 1fr; } .contact { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="brand-icon">📖</div>
        <div><div class="brand-main">中学理科クイズ</div><div class="brand-sub">200問から出題・編集もできる</div></div>
      </div>
      <div class="tabs"><div class="tab subject">⚗️ 理科</div><div class="tab unit" id="unitName">全範囲</div></div>
      <div class="status">
        <div class="status-item"><span>⏱️ のこり</span><span class="status-big" id="timeLeft">32</span><span>秒</span></div>
        <div class="divider"></div>
        <div class="status-item"><span>⭐ 得点</span><span class="status-big" id="score">0</span><span>点</span></div>
      </div>
    </header>

    <div class="mode-row">
      <button class="chip active" id="quizModeBtn">クイズ</button>
      <button class="chip" id="adminModeBtn">問題を追加・編集</button>
      <select class="select" id="unitFilter"></select>
      <button class="chip" id="shuffleBtn">ランダム出題</button>
      <span class="chip" id="countChip">200問</span>
    </div>

    <section id="quizView">
      <section class="question-area" id="questionArea">
        <div class="mascot"><div class="talk">考えよう！</div><div class="tako" aria-hidden="true"><div class="head"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div><div class="leg one"></div><div class="leg two"></div><div class="leg three"></div></div></div>
        <div class="question-card"><div class="question-number">第<strong id="questionNumber">1</strong>問</div><div class="question-text" id="questionText">問題文</div></div>
        <div class="mascot"><div class="talk robot">じっくり<br>考えてみよう！</div><div class="robot-face" aria-hidden="true"><div class="robot-screen">⌒‿⌒</div></div></div>
      </section>

      <main class="quiz-panel" id="quizPanel">
        <div class="answers" id="answers"></div>
        <div class="lifeline-title">✨ おたすけアイテム ✨</div>
        <div class="lifelines">
          <button class="lifeline-btn" id="fiftyBtn"><div class="lifeline-icon">②</div><div><div class="lifeline-main">2択にしてあげる！</div><div class="lifeline-sub" id="fiftyCount">残り2回使えるよ</div></div></button>
          <button class="lifeline-btn" id="stopBtn"><div class="lifeline-icon">⏱️</div><div><div class="lifeline-main">ストップしてあげる！</div><div class="lifeline-sub" id="stopCount">残り4回使えるよ！</div></div></button>
        </div>
        <div class="result-box" id="resultBox"><div class="result-title" id="resultTitle"></div><div class="explanation" id="explanation"></div></div>
        <div class="bottom-actions"><button class="nav-btn next-btn" id="nextBtn">次の問題　›</button><button class="nav-btn reset-btn" id="resetBtn">↻ 最初から</button></div>
      </main>

      <section class="finish-card" id="finishCard"><div class="finish-title">クイズ終了</div><div class="finish-score" id="finalScore">0点</div><div class="finish-message" id="finishMessage">おつかれさまでした。</div><button class="nav-btn next-btn" id="restartBtn">もう一度挑戦する</button></section>
    </section>

    <section class="admin-card" id="adminView">
      <div class="admin-head">
        <div><div class="admin-title">問題管理</div><div class="admin-note">追加・編集・削除した内容は、この端末のブラウザに保存されます。GitHub Pages上で全員に同じ問題を配る場合は、エクスポートしたJSONを使ってコード内の初期問題を書き換えてください。</div></div>
        <div class="admin-actions"><button class="action-btn light" id="backToQuizBtn">クイズに戻る</button><button class="action-btn primary" id="newQuestionBtn">新規作成</button></div>
      </div>
      <div class="admin-grid">
        <div class="question-list">
          <input class="search-input" id="adminSearch" placeholder="問題文・単元で検索" />
          <div class="list-meta"><span id="adminCount">0問</span><span>クリックで編集</span></div>
          <div id="questionList"></div>
        </div>
        <div class="editor">
          <div class="form-row"><label>単元</label><input class="form-input" id="editUnit" placeholder="例：植物のつくり" /></div>
          <div class="form-row"><label>問題文</label><textarea class="form-textarea" id="editQuestion" placeholder="問題文を入力"></textarea></div>
          <div class="choice-grid">
            <div class="form-row"><label>選択肢1</label><input class="form-input" id="choice0" /></div>
            <div class="form-row"><label>選択肢2</label><input class="form-input" id="choice1" /></div>
            <div class="form-row"><label>選択肢3</label><input class="form-input" id="choice2" /></div>
            <div class="form-row"><label>選択肢4</label><input class="form-input" id="choice3" /></div>
          </div>
          <div class="form-row"><label>正解</label><select class="select form-select" id="editAnswer"><option value="0">選択肢1</option><option value="1">選択肢2</option><option value="2">選択肢3</option><option value="3">選択肢4</option></select></div>
          <div class="form-row"><label>解説</label><textarea class="form-textarea" id="editExplanation" placeholder="解説を入力"></textarea></div>
          <div class="admin-actions"><button class="action-btn success" id="saveQuestionBtn">保存</button><button class="action-btn danger" id="deleteQuestionBtn">削除</button><button class="action-btn light" id="clearFormBtn">入力をクリア</button></div>
          <div class="import-area">
            <div class="form-row"><label>インポート・エクスポート用JSON</label><textarea class="form-textarea" id="jsonArea" placeholder="エクスポートするとここにJSONが出ます。インポートする場合はここに貼ります。"></textarea></div>
            <div class="admin-actions"><button class="action-btn primary" id="exportBtn">JSONをエクスポート</button><button class="action-btn success" id="importBtn">JSONをインポート</button><button class="action-btn danger" id="resetDefaultBtn">初期200問に戻す</button></div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <button class="contact">✉ CONTACT</button>
  <div class="toast" id="toast">保存しました</div>

  <script>
    const DEFAULT_QUESTIONS = [
  {
    "id": "q001",
    "unit": "植物のつくり",
    "question": "双子葉類の茎の断面では、維管束はどのように並んでいるか。",
    "choices": [
      "輪のように並ぶ",
      "バラバラに散らばる",
      "中心に1本だけある",
      "外側にはない"
    ],
    "answer": 0,
    "explanation": "双子葉類の茎では、維管束が輪状に並びます。"
  },
  {
    "id": "q002",
    "unit": "植物のつくり",
    "question": "単子葉類の茎の断面では、維管束はどのように並んでいるか。",
    "choices": [
      "輪のように並ぶ",
      "バラバラに散らばる",
      "形成層だけが並ぶ",
      "中心に集まる"
    ],
    "answer": 1,
    "explanation": "単子葉類の茎では、維管束が散らばって見えます。"
  },
  {
    "id": "q003",
    "unit": "植物のつくり",
    "question": "根で水や水に溶けた無機養分を吸収する部分はどれか。",
    "choices": [
      "気孔",
      "根毛",
      "葉脈",
      "子房"
    ],
    "answer": 1,
    "explanation": "根毛は表面積を大きくし、水や無機養分を吸収しやすくします。"
  },

      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return structuredClone(DEFAULT_QUESTIONS);
        const parsed = JSON.parse(saved);
        return validateQuestions(parsed) ? parsed : structuredClone(DEFAULT_QUESTIONS);
      } catch {
        return structuredClone(DEFAULT_QUESTIONS);
      }
    }

    function saveQuestions() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(questions));
      refreshUnitFilter();
      renderQuestionList();
      updateCount();
    }

    function validateQuestions(data) {
      return Array.isArray(data) && data.every(q =>
        q && typeof q.unit === "string" && typeof q.question === "string" &&
        Array.isArray(q.choices) && q.choices.length === 4 &&
        q.choices.every(c => typeof c === "string") &&
        Number.isInteger(q.answer) && q.answer >= 0 && q.answer <= 3 &&
        typeof q.explanation === "string"
      );
    }

    function showToast(text) {
      els.toast.textContent = text;
      els.toast.classList.add("show");
      setTimeout(() => els.toast.classList.remove("show"), 1700);
    }

    function uniqueUnits() {
      return [...new Set(questions.map(q => q.unit).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ja"));
    }

    function refreshUnitFilter() {
      const current = els.unitFilter.value || "__all__";
      els.unitFilter.innerHTML = `<option value="__all__">全範囲から出題</option>` + uniqueUnits().map(u => `<option value="${escapeHtml(u)}">${escapeHtml(u)}</option>`).join("");
      if ([...els.unitFilter.options].some(o => o.value === current)) els.unitFilter.value = current;
    }

    function updateCount() {
      els.countChip.textContent = `${questions.length}問登録中`;
    }

    function getFilteredQuestions() {
      const unit = els.unitFilter.value;
      const base = unit === "__all__" ? questions : questions.filter(q => q.unit === unit);
      return randomMode ? shuffle([...base]) : [...base];
    }

    function startQuiz() {
      clearInterval(timerId);
      quizQuestions = getFilteredQuestions();
      currentIndex = 0; score = 0; fiftyRemain = 2; stopRemain = 4;
      els.score.textContent = score;
      els.quizPanel.style.display = "block";
      els.questionArea.style.display = "grid";
      els.finishCard.classList.remove("show");
      if (quizQuestions.length === 0) {
        els.questionText.textContent = "出題できる問題がありません。問題を追加してください。";
        els.quizPanel.style.display = "none";
        return;
      }
      renderQuestion();
    }

    function renderQuestion() {
      clearInterval(timerId);
      const q = quizQuestions[currentIndex];
      answered = false; timeStopped = false; timeLeft = TIME_LIMIT;
      els.unitName.textContent = q.unit;
      els.timeLeft.textContent = timeLeft;
      els.score.textContent = score;
      els.questionNumber.textContent = currentIndex + 1;
      els.questionText.textContent = q.question;
      els.resultBox.classList.remove("show");
      els.resultTitle.textContent = ""; els.explanation.textContent = "";
      els.answers.innerHTML = "";
      q.choices.forEach((choice, index) => {
        const button = document.createElement("button");
        button.className = "answer-btn";
        button.dataset.index = index;
        button.innerHTML = `<span class="choice-number">${index + 1}</span><span>${escapeHtml(choice)}</span><span class="choice-arrow">›</span>`;
        button.addEventListener("click", () => selectAnswer(index));
        els.answers.appendChild(button);
      });
      updateLifelineButtons();
      startTimer();
    }

    function startTimer() {
      timerId = setInterval(() => {
        if (answered || timeStopped) return;
        timeLeft--;
        els.timeLeft.textContent = timeLeft;
        if (timeLeft <= 0) { clearInterval(timerId); timeUp(); }
      }, 1000);
    }

    function selectAnswer(selectedIndex) {
      if (answered) return;
      answered = true;
      clearInterval(timerId);
      const q = quizQuestions[currentIndex];
      const buttons = [...document.querySelectorAll(".answer-btn")];
      buttons.forEach(button => {
        const index = Number(button.dataset.index);
        button.disabled = true;
        if (index === q.answer) button.classList.add("correct");
        if (index === selectedIndex && selectedIndex !== q.answer) button.classList.add("wrong");
      });
      if (selectedIndex === q.answer) {
        const point = Math.max(5, 10 + Math.floor(timeLeft / 4));
        score += point;
        els.score.textContent = score;
        showResult(true, `正解！ +${point}点`, q.explanation);
      } else {
        showResult(false, "不正解", q.explanation);
      }
    }

    function timeUp() {
      if (answered) return;
      answered = true;
      const q = quizQuestions[currentIndex];
      [...document.querySelectorAll(".answer-btn")].forEach(button => {
        const index = Number(button.dataset.index);
        button.disabled = true;
        button.classList.add(index === q.answer ? "correct" : "wrong");
      });
      showResult(false, "時間切れ", q.explanation);
    }

    function showResult(isCorrect, title, explanation) {
      els.resultBox.classList.add("show");
      els.resultTitle.textContent = title;
      els.resultTitle.className = "result-title " + (isCorrect ? "correct-text" : "wrong-text");
      els.explanation.textContent = explanation;
      updateLifelineButtons();
    }

    function useFifty() {
      if (answered || fiftyRemain <= 0) return;
      const q = quizQuestions[currentIndex];
      const wrongIndexes = shuffle(q.choices.map((_, i) => i).filter(i => i !== q.answer));
      const buttons = [...document.querySelectorAll(".answer-btn")];
      wrongIndexes.slice(0, 2).forEach(index => buttons[index].classList.add("hidden-choice"));
      fiftyRemain--;
      updateLifelineButtons();
    }

    function useStop() {
      if (answered || stopRemain <= 0 || timeStopped) return;
      timeStopped = true;
      stopRemain--;
      updateLifelineButtons();
      els.stopBtn.querySelector(".lifeline-main").textContent = "時間停止中！";
      setTimeout(() => {
        if (!answered) {
          timeStopped = false;
          els.stopBtn.querySelector(".lifeline-main").textContent = "ストップしてあげる！";
        }
      }, 5000);
    }

    function updateLifelineButtons() {
      els.fiftyCount.textContent = `残り${fiftyRemain}回使えるよ`;
      els.stopCount.textContent = `残り${stopRemain}回使えるよ！`;
      els.fiftyBtn.disabled = fiftyRemain <= 0 || answered;
      els.stopBtn.disabled = stopRemain <= 0 || answered;
      if (!timeStopped) els.stopBtn.querySelector(".lifeline-main").textContent = "ストップしてあげる！";
    }

    function nextQuestion() {
      if (currentIndex < quizQuestions.length - 1) { currentIndex++; renderQuestion(); }
      else showFinish();
    }

    function showFinish() {
      clearInterval(timerId);
      els.quizPanel.style.display = "none";
      els.questionArea.style.display = "none";
      els.finishCard.classList.add("show");
      els.finalScore.textContent = `${score}点`;
      const rate = score / Math.max(1, quizQuestions.length * 18);
      els.finishMessage.textContent = rate >= .8 ? "かなりよく理解できています。入試レベルの問題にも進めます。" : rate >= .5 ? "基本は押さえられています。間違えた問題の解説を確認しましょう。" : "まずは重要語句と基本のしくみを確認しましょう。もう一度挑戦すると定着します。";
    }

    function showQuizMode() {
      els.quizView.style.display = "block";
      els.adminView.classList.remove("show");
      els.quizModeBtn.classList.add("active");
      els.adminModeBtn.classList.remove("active");
      startQuiz();
    }

    function showAdminMode() {
      clearInterval(timerId);
      els.quizView.style.display = "none";
      els.adminView.classList.add("show");
      els.quizModeBtn.classList.remove("active");
      els.adminModeBtn.classList.add("active");
      renderQuestionList();
      clearForm();
    }

    function renderQuestionList() {
      const keyword = els.adminSearch.value.trim().toLowerCase();
      const filtered = questions.filter(q => !keyword || `${q.unit} ${q.question} ${q.choices.join(" ")}`.toLowerCase().includes(keyword));
      els.adminCount.textContent = `${filtered.length}問表示 / ${questions.length}問`;
      els.questionList.innerHTML = filtered.map(q => `
        <button class="q-item ${q.id === editingId ? "active" : ""}" data-id="${escapeHtml(q.id)}">
          ${escapeHtml(q.question)}
          <small>${escapeHtml(q.unit)} / 正解：${escapeHtml(q.choices[q.answer] || "")}</small>
        </button>`).join("");
      els.questionList.querySelectorAll(".q-item").forEach(btn => btn.addEventListener("click", () => editExistingQuestion(btn.dataset.id)));
    }

    function editExistingQuestion(id) {
      const q = questions.find(item => item.id === id);
      if (!q) return;
      editingId = id;
      $("editUnit").value = q.unit;
      $("editQuestion").value = q.question;
      q.choices.forEach((choice, i) => $("choice" + i).value = choice);
      $("editAnswer").value = String(q.answer);
      $("editExplanation").value = q.explanation;
      renderQuestionList();
    }

    function clearForm() {
      editingId = null;
      $("editUnit").value = "";
      $("editQuestion").value = "";
      [0,1,2,3].forEach(i => $("choice" + i).value = "");
      $("editAnswer").value = "0";
      $("editExplanation").value = "";
      renderQuestionList();
    }

    function readFormQuestion() {
      const unit = $("editUnit").value.trim();
      const question = $("editQuestion").value.trim();
      const choices = [0,1,2,3].map(i => $("choice" + i).value.trim());
      const answer = Number($("editAnswer").value);
      const explanation = $("editExplanation").value.trim();
      if (!unit || !question || choices.some(c => !c) || !explanation) {
        alert("単元、問題文、4つの選択肢、解説をすべて入力してください。");
        return null;
      }
      return { id: editingId || makeId(), unit, question, choices, answer, explanation };
    }

    function saveFormQuestion() {
      const q = readFormQuestion();
      if (!q) return;
      const index = questions.findIndex(item => item.id === q.id);
      if (index >= 0) questions[index] = q;
      else questions.unshift(q);
      editingId = q.id;
      saveQuestions();
      renderQuestionList();
      showToast("問題を保存しました");
    }

    function deleteCurrentQuestion() {
      if (!editingId) { alert("削除する問題を左の一覧から選んでください。"); return; }
      if (!confirm("この問題を削除しますか？")) return;
      questions = questions.filter(q => q.id !== editingId);
      saveQuestions();
      clearForm();
      showToast("問題を削除しました");
    }

    function exportJson() {
      $("jsonArea").value = JSON.stringify(questions, null, 2);
      showToast("JSONを出力しました");
    }

    function importJson() {
      try {
        const data = JSON.parse($("jsonArea").value);
        if (!validateQuestions(data)) throw new Error("形式が違います");
        questions = data.map((q, i) => ({ ...q, id: q.id || `q${Date.now()}_${i}` }));
        editingId = null;
        saveQuestions();
        renderQuestionList();
        showToast("JSONを読み込みました");
      } catch (e) {
        alert("JSONの形式が正しくありません。エクスポートした形式に合わせてください。");
      }
    }

    function resetDefault() {
      if (!confirm("追加・編集した内容を消して、初期200問に戻しますか？")) return;
      questions = structuredClone(DEFAULT_QUESTIONS);
      localStorage.removeItem(STORAGE_KEY);
      editingId = null;
      refreshUnitFilter();
      renderQuestionList();
      clearForm();
      updateCount();
      showToast("初期200問に戻しました");
    }

    function makeId() { return "q" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
    function shuffle(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } return array; }
    function escapeHtml(value) { return String(value).replace(/[&<>"']/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[s])); }

    els.nextBtn.addEventListener("click", nextQuestion);
    els.resetBtn.addEventListener("click", startQuiz);
    $("restartBtn").addEventListener("click", startQuiz);
    els.fiftyBtn.addEventListener("click", useFifty);
    els.stopBtn.addEventListener("click", useStop);
    els.unitFilter.addEventListener("change", startQuiz);
    $("shuffleBtn").addEventListener("click", () => { randomMode = !randomMode; $("shuffleBtn").classList.toggle("active", randomMode); startQuiz(); });
    els.quizModeBtn.addEventListener("click", showQuizMode);
    els.adminModeBtn.addEventListener("click", showAdminMode);
    $("backToQuizBtn").addEventListener("click", showQuizMode);
    $("newQuestionBtn").addEventListener("click", clearForm);
    $("clearFormBtn").addEventListener("click", clearForm);
    $("saveQuestionBtn").addEventListener("click", saveFormQuestion);
    $("deleteQuestionBtn").addEventListener("click", deleteCurrentQuestion);
    $("exportBtn").addEventListener("click", exportJson);
    $("importBtn").addEventListener("click", importJson);
    $("resetDefaultBtn").addEventListener("click", resetDefault);
    els.adminSearch.addEventListener("input", renderQuestionList);

    refreshUnitFilter();
    updateCount();
    startQuiz();
  </script>
</body>
</html>
