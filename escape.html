<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>理科室からの脱出 改良版</title>
  <style>
    :root {
      --bg: #f1eee5;
      --paper: #fffdf8;
      --ink: #1f2a2e;
      --sub: #687479;
      --line: #d8cfbf;
      --green: #2f6f5e;
      --green-dark: #244f45;
      --blue: #315f82;
      --yellow: #ddbe58;
      --red: #a3493e;
      --brown: #8b6843;
      --shadow: 0 16px 40px rgba(25, 31, 33, 0.14);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(rgba(241,238,229,.96), rgba(241,238,229,.96)),
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 40px,
          rgba(0,0,0,.02) 40px,
          rgba(0,0,0,.02) 41px
        );
    }

    header {
      background: #203630;
      color: white;
      border-bottom: 6px solid #c9a748;
      padding: 16px 18px;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      gap: 16px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: .04em;
    }

    .subtitle {
      margin: 6px 0 0;
      color: #dce7e0;
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      background: #f6f0d7;
      color: #23302e;
      box-shadow: 0 4px 0 rgba(0,0,0,.16);
    }

    .pill-btn:hover {
      transform: translateY(1px);
      box-shadow: 0 3px 0 rgba(0,0,0,.16);
    }

    main {
      max-width: 1280px;
      margin: 20px auto;
      padding: 0 16px 32px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    .panel,
    .message-box,
    .room-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .room-card {
      padding: 14px;
    }

    .room-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .room-head h2 {
      margin: 0;
      font-size: 21px;
    }

    .progress {
      font-size: 14px;
      color: var(--sub);
      font-weight: 700;
    }

    /* ======================
       理科室のイラスト風画面
       ====================== */
    .room-scene {
      position: relative;
      width: 100%;
      min-height: 690px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #c9bba4;
      background:
        linear-gradient(to bottom, #dfe8eb 0 68%, #b89a72 68% 100%);
    }

    /* 壁・床 */
    .room-wall-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 68%;
      height: 3px;
      background: rgba(74, 56, 38, .25);
    }

    .room-floor-lines::before,
    .room-floor-lines::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      top: 68%;
      background:
        repeating-linear-gradient(
          0deg,
          transparent 0,
          transparent 39px,
          rgba(86,59,32,.12) 39px,
          rgba(86,59,32,.12) 40px
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 79px,
          rgba(86,59,32,.12) 79px,
          rgba(86,59,32,.12) 80px
        );
      pointer-events: none;
    }

    /* 窓 */
    .window {
      position: absolute;
      top: 34px;
      width: 130px;
      height: 160px;
      background: #cfe5f2;
      border: 8px solid #8f7451;
      border-radius: 6px;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.35);
    }
    .window.left { left: 28px; }
    .window.right { left: 176px; }
    .window::before, .window::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,.55);
    }
    .window::before {
      width: 100%;
      height: 4px;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }
    .window::after {
      width: 4px;
      height: 100%;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    /* 黒板 */
    .board-bg {
      position: absolute;
      top: 36px;
      left: 350px;
      width: 380px;
      height: 170px;
      background: #28433b;
      border: 10px solid #8b6843;
      border-radius: 10px;
      box-shadow: inset 0 0 18px rgba(0,0,0,.22);
    }
    .chalk {
      position: absolute;
      inset: 18px;
      color: #eff9f1;
      font-weight: 700;
      line-height: 1.7;
      font-size: 18px;
      pointer-events: none;
    }
    .chalk strong { color: #ffe37f; }

    /* 棚 */
    .cabinet {
      position: absolute;
      top: 220px;
      left: 36px;
      width: 220px;
      height: 250px;
      background: #b9956d;
      border: 8px solid #88633e;
      border-radius: 8px;
    }
    .cabinet::before, .cabinet::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 4px;
      background: rgba(80,49,20,.35);
    }
    .cabinet::before { left: 50%; transform: translateX(-50%); }
    .cabinet::after { display: none; }

    .cabinet-shelf {
      position: absolute;
      left: 10px;
      right: 10px;
      height: 4px;
      background: rgba(80,49,20,.35);
    }
    .cabinet-shelf.s1 { top: 82px; }
    .cabinet-shelf.s2 { top: 160px; }

    .cabinet-bottle {
      position: absolute;
      width: 22px;
      height: 42px;
      background: #d8e7f2;
      border: 2px solid rgba(57,80,96,.3);
      border-radius: 6px 6px 8px 8px;
    }
    .cabinet-bottle::before {
      content: "";
      position: absolute;
      width: 10px;
      height: 8px;
      left: 50%;
      top: -8px;
      transform: translateX(-50%);
      background: #7f8790;
      border-radius: 3px 3px 0 0;
    }

    /* ポスター */
    .poster-bg {
      position: absolute;
      top: 232px;
      right: 210px;
      width: 150px;
      height: 205px;
      background: #f4ecdb;
      border: 8px solid #8f7451;
      border-radius: 6px;
      overflow: hidden;
    }
    .poster-stripes {
      position: absolute;
      inset: 14px;
      background:
        linear-gradient(to top, #7e5e3f 0 20%, #b3875b 20% 40%, #d0af7d 40% 60%, #e6cf9d 60% 80%, #f2e6c9 80% 100%);
      border: 1px solid rgba(0,0,0,.08);
    }
    .poster-title {
      position: absolute;
      top: 10px;
      left: 8px;
      right: 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      color: #56412f;
      letter-spacing: .08em;
      background: rgba(255,255,255,.78);
      padding: 4px;
      border-radius: 999px;
    }

    /* ドア */
    .door-bg {
      position: absolute;
      top: 184px;
      right: 24px;
      width: 160px;
      height: 370px;
      background: #835f3f;
      border: 9px solid #67482e;
      border-radius: 10px 10px 0 0;
    }
    .door-window {
      position: absolute;
      top: 30px;
      left: 24px;
      width: 100px;
      height: 90px;
      border: 6px solid #d6dce1;
      background: #b9d4e6;
      border-radius: 6px;
    }
    .door-window::before, .door-window::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,.55);
    }
    .door-window::before {
      width: 100%;
      height: 4px;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }
    .door-window::after {
      width: 4px;
      height: 100%;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    /* 実験台 */
    .table {
      position: absolute;
      left: 250px;
      right: 210px;
      bottom: 62px;
      height: 220px;
    }
    .table-top {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 24px;
      background: #5d4a39;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,.18);
    }
    .table-front {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 24px;
      bottom: 0;
      background: #c9b197;
      border: 7px solid #947457;
      border-top: none;
      border-radius: 0 0 18px 18px;
    }
    .table-leg {
      position: absolute;
      width: 14px;
      bottom: -14px;
      top: 12px;
      background: #6e5641;
      border-radius: 8px;
    }
    .table-leg.l1 { left: 22px; }
    .table-leg.l2 { right: 22px; }

    .drawer-shape {
      position: absolute;
      width: 120px;
      height: 44px;
      bottom: 112px;
      left: 50%;
      transform: translateX(-50%);
      border: 3px solid rgba(96,70,46,.35);
      border-radius: 8px;
      background: rgba(255,255,255,.08);
    }
    .drawer-shape::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 6px;
      background: rgba(70,48,29,.45);
      border-radius: 999px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    /* 小物の見た目 */
    .obj {
      position: absolute;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      z-index: 5;
    }

    .obj:focus-visible {
      outline: 3px solid #ffd86c;
      outline-offset: 4px;
      border-radius: 8px;
    }

    .obj::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(100% + 8px);
      white-space: nowrap;
      font-size: 12px;
      font-weight: 700;
      color: white;
      background: rgba(24,31,35,.88);
      padding: 6px 8px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: .15s ease;
    }

    .obj:hover::after,
    .obj:focus-visible::after {
      opacity: 1;
    }

    .obj .mark {
      position: absolute;
      right: -4px;
      top: -4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      color: white;
      font-size: 11px;
      font-weight: 800;
      display: grid;
      place-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,.18);
      background: #8a7b66;
    }

    .obj.solved .mark { background: var(--green); }
    .obj.locked .mark { background: #8b6843; }

    /* 黒板クリック領域 */
    .obj-blackboard {
      top: 36px;
      left: 350px;
      width: 380px;
      height: 170px;
      border-radius: 10px;
    }

    /* 棚 */
    .obj-shelf {
      top: 220px;
      left: 36px;
      width: 220px;
      height: 250px;
      border-radius: 8px;
    }

    /* ポスター */
    .obj-geology {
      top: 232px;
      right: 210px;
      width: 150px;
      height: 205px;
      border-radius: 6px;
    }

    /* ドア */
    .obj-door {
      top: 184px;
      right: 24px;
      width: 160px;
      height: 370px;
      border-radius: 10px 10px 0 0;
    }

    /* ビーカー */
    .obj-beaker {
      left: 358px;
      bottom: 252px;
      width: 64px;
      height: 78px;
    }
    .obj-beaker .shape {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 0;
      height: 64px;
      border: 4px solid #88a9bc;
      border-top: 8px solid #88a9bc;
      border-radius: 0 0 8px 8px;
      background: linear-gradient(to top, rgba(170,218,245,.25) 0 34%, transparent 34% 100%);
    }

    /* メスシリンダー */
    .obj-cylinder {
      left: 300px;
      bottom: 246px;
      width: 54px;
      height: 88px;
    }
    .obj-cylinder .shape {
      position: absolute;
      left: 16px;
      width: 20px;
      bottom: 10px;
      height: 70px;
      border: 3px solid #80a0b2;
      border-radius: 8px 8px 4px 4px;
      background: linear-gradient(to top, rgba(166,204,227,.4) 0 54%, transparent 54% 100%);
    }
    .obj-cylinder .base {
      position: absolute;
      left: 7px;
      bottom: 0;
      width: 40px;
      height: 10px;
      background: #a2aab1;
      border-radius: 999px;
    }

    /* ガスバーナー */
    .obj-burner {
      left: 432px;
      bottom: 244px;
      width: 68px;
      height: 92px;
    }
    .obj-burner .stand {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 44px;
      height: 12px;
      background: #757d84;
      border-radius: 999px;
    }
    .obj-burner .pipe {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 12px;
      width: 10px;
      height: 52px;
      background: #626a72;
      border-radius: 6px;
    }
    .obj-burner .mouth {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 58px;
      width: 18px;
      height: 22px;
      background: #6d767e;
      border-radius: 6px 6px 2px 2px;
    }

    /* 顕微鏡 */
    .obj-microscope {
      left: 520px;
      bottom: 230px;
      width: 112px;
      height: 112px;
    }
    .obj-microscope .base {
      position: absolute;
      bottom: 0;
      left: 16px;
      width: 70px;
      height: 14px;
      background: #535b63;
      border-radius: 999px;
    }
    .obj-microscope .arm {
      position: absolute;
      left: 34px;
      bottom: 14px;
      width: 14px;
      height: 68px;
      background: #656f77;
      border-radius: 10px;
      transform: rotate(22deg);
      transform-origin: bottom center;
    }
    .obj-microscope .tube {
      position: absolute;
      left: 52px;
      bottom: 60px;
      width: 16px;
      height: 40px;
      background: #505860;
      border-radius: 8px;
      transform: rotate(35deg);
      transform-origin: bottom center;
    }
    .obj-microscope .stage {
      position: absolute;
      left: 28px;
      bottom: 42px;
      width: 44px;
      height: 10px;
      background: #4f5860;
      border-radius: 5px;
    }

    /* 方位磁針 */
    .obj-compass {
      left: 652px;
      bottom: 252px;
      width: 72px;
      height: 72px;
    }
    .obj-compass .shape {
      position: absolute;
      inset: 8px;
      border: 4px solid #7c8388;
      background: #faf8f0;
      border-radius: 50%;
    }
    .obj-compass .needle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 42px;
      background: linear-gradient(to bottom, #cc4d42 0 50%, #4a6fb0 50% 100%);
      transform: translate(-50%, -50%) rotate(45deg);
      border-radius: 999px;
    }

    /* 回路装置 */
    .obj-circuit {
      left: 740px;
      bottom: 240px;
      width: 110px;
      height: 86px;
    }
    .obj-circuit .board {
      position: absolute;
      inset: 8px;
      background: #efe5cc;
      border: 4px solid #8b704d;
      border-radius: 10px;
    }
    .obj-circuit .wire1, .obj-circuit .wire2 {
      position: absolute;
      height: 4px;
      background: #c74a3d;
      border-radius: 999px;
    }
    .obj-circuit .wire1 { left: 20px; top: 30px; width: 54px; }
    .obj-circuit .wire2 { left: 40px; top: 50px; width: 48px; background: #3b6eb0; }

    /* 金属片 */
    .obj-density {
      left: 850px;
      bottom: 254px;
      width: 64px;
      height: 58px;
    }
    .obj-density .shape {
      position: absolute;
      inset: 12px;
      background: linear-gradient(135deg, #bfc5cc, #8c949c);
      border-radius: 6px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.35);
    }

    /* 追加ミッション小物 */
    .obj-weather {
      right: 380px;
      top: 460px;
      width: 72px;
      height: 56px;
    }
    .obj-weather .shape,
    .obj-heredity .shape,
    .obj-space .shape {
      position: absolute;
      inset: 0;
      background: #fdfaf0;
      border: 3px solid #d2c4a7;
      border-radius: 8px;
      box-shadow: 2px 2px 0 rgba(0,0,0,.08);
    }
    .obj-weather .shape::before {
      content: "低気圧";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: #48607d;
    }

    .obj-heredity {
      right: 294px;
      top: 468px;
      width: 72px;
      height: 56px;
    }
    .obj-heredity .shape::before {
      content: "Aa × Aa";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: #7e5e48;
    }

    .obj-space {
      right: 208px;
      top: 476px;
      width: 72px;
      height: 56px;
    }
    .obj-space .shape::before {
      content: "満月";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: #575d7f;
    }

    /* 引き出し */
    .obj-drawer {
      left: 50%;
      transform: translateX(-50%);
      bottom: 170px;
      width: 128px;
      height: 52px;
      border-radius: 8px;
    }

    .obj-drawer.hidden-hotspot {
      opacity: .22;
    }

    .obj-drawer .front {
      position: absolute;
      inset: 0;
      border: 3px solid rgba(96,70,46,.45);
      border-radius: 8px;
      background: rgba(255,255,255,.12);
    }
    .obj-drawer .front::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 6px;
      background: rgba(70,48,29,.48);
      border-radius: 999px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    /* 空の場所クリック */
    .scene-click-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: transparent;
    }

    .panel {
      padding: 16px;
      height: fit-content;
      position: sticky;
      top: 12px;
    }

    .panel h3 {
      margin: 0 0 10px;
      font-size: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    .objective {
      background: #f6f0d7;
      border: 1px solid #e1d08b;
      border-radius: 12px;
      padding: 12px;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .inventory {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .item-card {
      border: 1px solid var(--line);
      background: white;
      border-radius: 12px;
      padding: 10px;
      font-size: 14px;
      line-height: 1.6;
    }

    .empty {
      color: var(--sub);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .code-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .code-cell {
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      text-align: center;
      padding: 10px 4px;
    }

    .code-cell small {
      display: block;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .code-cell strong {
      font-size: 22px;
    }

    .message-box {
      margin-top: 14px;
      padding: 14px;
      line-height: 1.8;
      min-height: 78px;
    }

    /* モーダル */
    .modal-back {
      position: fixed;
      inset: 0;
      background: rgba(13, 17, 20, .58);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 30;
    }

    .modal-back.show {
      display: flex;
    }

    .modal {
      width: min(760px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,.28);
      padding: 18px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 14px;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 22px;
    }

    .close-btn {
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #e9e1d2;
      cursor: pointer;
      font-size: 18px;
      font-weight: 800;
    }

    .question-box {
      background: white;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      line-height: 1.85;
      margin-bottom: 12px;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice-btn, .action-btn, .secondary-btn {
      border-radius: 12px;
      padding: 12px;
      font-family: inherit;
      font-size: 15px;
      cursor: pointer;
    }

    .choice-btn {
      border: 1px solid #b9ab94;
      background: white;
      text-align: left;
      line-height: 1.6;
    }

    .choice-btn:hover {
      background: #f5fbf7;
      border-color: var(--green);
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .action-btn {
      border: none;
      background: var(--green);
      color: white;
      font-weight: 800;
    }

    .secondary-btn {
      border: 1px solid #c9bda7;
      background: #fbf8ef;
      font-weight: 700;
    }

    .hint-box,
    .status-box {
      display: none;
      margin-top: 12px;
      border-radius: 12px;
      padding: 12px;
      line-height: 1.75;
    }

    .hint-box.show,
    .status-box.show {
      display: block;
    }

    .hint-box {
      background: #f6f0d7;
      border: 1px solid #e1d08b;
    }

    .status-box.ok {
      background: #edf7ed;
      border: 1px solid #99c59c;
    }

    .status-box.ng {
      background: #fff0ed;
      border: 1px solid #d89a90;
    }

    .lock-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
    }

    .lock-input {
      width: 180px;
      font-size: 24px;
      letter-spacing: .22em;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: white;
    }

    .clear-box {
      background: #eef7ee;
      border: 1px solid #99c59c;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.8;
    }

    .review-list {
      margin: 10px 0 0;
      padding-left: 1.2em;
    }

    .review-list li {
      margin-bottom: 6px;
    }

    @media (max-width: 900px) {
      .room-scene {
        min-height: 760px;
      }

      .board-bg { left: 260px; width: 320px; }
      .obj-blackboard { left: 260px; width: 320px; }

      .table { left: 180px; right: 165px; }
      .obj-beaker { left: 280px; }
      .obj-cylinder { left: 230px; }
      .obj-burner { left: 350px; }
      .obj-microscope { left: 440px; }
      .obj-compass { left: 560px; }
      .obj-circuit { left: 650px; }
      .obj-density { left: 760px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>理科室からの脱出</h1>
        <p class="subtitle">理科室の中を調べ、見つけた手がかりと理科の知識でドアの暗号を解こう。</p>
      </div>
      <div class="top-actions">
        <button class="pill-btn" id="globalHintBtn">今の目標</button>
        <button class="pill-btn" id="resetBtn">最初から</button>
      </div>
    </div>
  </header>

  <main>
    <section>
      <div class="room-card">
        <div class="room-head">
          <h2>理科室を探索する</h2>
          <div class="progress" id="progressText">探索中...</div>
        </div>

        <div class="room-scene" id="roomScene">
          <div class="window left"></div>
          <div class="window right"></div>

          <div class="board-bg">
            <div class="chalk">
              <div>先生からのメッセージ</div>
              <div><strong>「体積 → 色 → 倍率 → 電気」</strong></div>
              <div>4つの数字をこの順に並べよ</div>
            </div>
          </div>

          <div class="cabinet">
            <div class="cabinet-shelf s1"></div>
            <div class="cabinet-shelf s2"></div>
            <div class="cabinet-bottle" style="left:18px; top:20px;"></div>
            <div class="cabinet-bottle" style="left:58px; top:24px; height:38px;"></div>
            <div class="cabinet-bottle" style="left:128px; top:20px; background:#dff0dd;"></div>
            <div class="cabinet-bottle" style="left:168px; top:24px; background:#f3e1d7;"></div>
            <div class="cabinet-bottle" style="left:22px; top:102px; background:#d8e7f2;"></div>
            <div class="cabinet-bottle" style="left:70px; top:102px; background:#d8e7f2;"></div>
            <div class="cabinet-bottle" style="left:126px; top:102px; background:#dff0dd;"></div>
            <div class="cabinet-bottle" style="left:176px; top:102px; background:#f0e5d8;"></div>
          </div>

          <div class="poster-bg">
            <div class="poster-stripes"></div>
            <div class="poster-title">地層のきまり</div>
          </div>

          <div class="door-bg">
            <div class="door-window"></div>
          </div>

          <div class="table">
            <div class="table-top"></div>
            <div class="table-front"></div>
            <div class="table-leg l1"></div>
            <div class="table-leg l2"></div>
            <div class="drawer-shape"></div>
          </div>

          <div class="room-wall-line"></div>
          <div class="room-floor-lines"></div>

          <!-- クリック用オブジェクト -->
          <button class="obj obj-blackboard" data-spot="blackboard" data-label="黒板">
            <span class="mark">!</span>
          </button>

          <button class="obj obj-shelf" data-spot="shelf" data-label="薬品棚">
            <span class="mark">?</span>
          </button>

          <button class="obj obj-geology" data-spot="geology" data-label="地層ポスター">
            <span class="mark">?</span>
          </button>

          <button class="obj obj-door" data-spot="door" data-label="出口のドア">
            <span class="mark">鍵</span>
          </button>

          <button class="obj obj-cylinder" data-spot="cylinder" data-label="メスシリンダー">
            <div class="shape"></div>
            <div class="base"></div>
            <span class="mark">?</span>
          </button>

          <button class="obj obj-beaker" data-spot="beaker" data-label="ビーカー">
            <div class="shape"></div>
            <span class="mark">?</span>
          </button>

          <button class="obj obj-burner" data-spot="burner" data-label="ガスバーナー">
            <div class="stand"></div>
            <div class="pipe"></div>
            <div class="mouth"></div>
            <span class="mark">?</span>
          </button>

          <button class="obj obj-microscope" data-spot="microscope" data-label="顕微鏡">
            <div class="base"></div>
            <div class="arm"></div>
            <div class="tube"></div>
            <div class="stage"></div>
            <span class="mark">?</span>
          </button>

          <button class="obj obj-compass" data-spot="compass" data-label="方位磁針">
            <div class="shape"></div>
            <div class="needle"></div>
            <span class="mark">?</span>
          </button>

          <button class="obj obj-circuit" data-spot="circuit" data-label="回路装置">
            <div class="board"></div>
            <div class="wire1"></div>
            <div class="wire2"></div>
            <span class="mark">?</span>
          </button>

          <button class="obj obj-density" data-spot="density" data-label="金属片">
            <div class="shape"></div>
            <span class="mark">+</span>
          </button>

          <button class="obj obj-weather" data-spot="weather" data-label="天気図カード">
            <div class="shape"></div>
            <span class="mark">+</span>
          </button>

          <button class="obj obj-heredity" data-spot="heredity" data-label="遺伝カード">
            <div class="shape"></div>
            <span class="mark">+</span>
          </button>

          <button class="obj obj-space" data-spot="space" data-label="天体カード">
            <div class="shape"></div>
            <span class="mark">+</span>
          </button>

          <button class="obj obj-drawer hidden-hotspot" id="drawerObj" data-spot="drawer" data-label="机の引き出し">
            <div class="front"></div>
            <span class="mark">?</span>
          </button>

          <div class="scene-click-layer" id="emptyScene"></div>
        </div>
      </div>

      <div class="message-box" id="messageBox">
        黒板や実験器具を調べてみよう。何かが見つかるかもしれない。
      </div>
    </section>

    <aside class="panel">
      <h3>現在の目標</h3>
      <div class="objective" id="objectiveBox">まずは黒板を調べて、暗号のルールを確認しよう。</div>

      <h3>持ち物</h3>
      <div class="inventory" id="inventoryBox"></div>

      <h3>暗号メモ</h3>
      <div class="code-grid">
        <div class="code-cell">
          <small>体積</small>
          <strong id="codeVolume">?</strong>
        </div>
        <div class="code-cell">
          <small>色</small>
          <strong id="codeColor">?</strong>
        </div>
        <div class="code-cell">
          <small>倍率</small>
          <strong id="codeMicro">?</strong>
        </div>
        <div class="code-cell">
          <small>電気</small>
          <strong id="codeElectric">?</strong>
        </div>
      </div>
    </aside>
  </main>

  <div class="modal-back" id="modalBack">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalTitle">タイトル</h2>
        <button class="close-btn" id="closeModal">×</button>
      </div>
      <div id="modalBody"></div>
      <div class="action-row">
        <button class="secondary-btn" id="modalHintBtn">ヒントを見る</button>
      </div>
      <div class="hint-box" id="modalHint"></div>
      <div class="status-box" id="modalStatus"></div>
    </div>
  </div>

  <script>
    const FINAL_CODE = "8714";

    const defaultState = {
      items: [],
      solved: {},
      codes: {},
      hints: {},
      currentTarget: "まずは黒板を調べて、暗号のルールを確認しよう。",
      activeSpot: "blackboard",
      clear: false
    };

    let state = loadState();

    const itemInfo = {
      "小さな鍵": "薬品棚を開けるための鍵。",
      "BTB溶液": "酸性・中性・アルカリ性を色で調べる薬品。",
      "接眼レンズ": "顕微鏡に取り付けるレンズ。",
      "導線": "回路をつなぐための線。",
      "電池": "回路に必要な電源。"
    };

    const hints = {
      blackboard: [
        "最後の暗号は4桁で、黒板に書かれた順番で並べる。",
        "集める数字は「体積」「色」「倍率」「電気」の4つ。",
        "まずは、すぐ触れそうな実験器具を調べてみよう。"
      ],
      cylinder: [
        "メスシリンダーは目盛りを読む器具。",
        "液面は少しへこんで見える。読むのは一番低いところ。",
        "38mLなので、体積の暗号は一の位の8。"
      ],
      shelf: [
        "薬品棚は今のままでは開かないかもしれない。",
        "どこかで小さな鍵を見つける必要がある。",
        "まずはメスシリンダーを調べてみよう。"
      ],
      beaker: [
        "透明な液体の性質は、そのままではわからない。",
        "酸性・中性・アルカリ性を調べる薬品が必要。",
        "BTB溶液で黄色になったら、棚のメモの『黄』の数字を使う。"
      ],
      burner: [
        "ガスバーナーは正しい使い方を知っていると先へ進める。",
        "火をつける前に、ガスを大きく出すのは危険。",
        "安全確認のあと、机のどこかをもう一度調べよう。"
      ],
      drawer: [
        "引き出しは、最初は見つけても開かないかもしれない。",
        "ガスバーナーの安全確認で、机のロックがゆるむ。",
        "ガスバーナーのあとに引き出しを調べよう。"
      ],
      microscope: [
        "顕微鏡の倍率は、接眼レンズの倍率×対物レンズの倍率。",
        "10倍×15倍を計算する。",
        "150倍なので、倍率の暗号は百の位の1。"
      ],
      compass: [
        "方位磁針のN極は北を指す。",
        "北東は、北と東の間の方角。",
        "N→E の順で押すと箱が開く。"
      ],
      geology: [
        "地層は、ふつう下ほど古い。",
        "一番古い地層を選ぶ。",
        "一番下のC層の裏に電池が隠れている。"
      ],
      circuit: [
        "回路装置には、まだ道具が足りないかもしれない。",
        "導線と電池が必要。",
        "電流計は直列、電圧計は並列。"
      ],
      door: [
        "暗号の順番は黒板に書いてある。",
        "体積→色→倍率→電気。",
        "集めた数字は 8, 7, 1, 4 なので、8714。"
      ],
      density: [
        "密度は、質量÷体積で求める。",
        "54 ÷ 20 を計算する。",
        "2.7g/cm³。"
      ],
      weather: [
        "日本付近の低気圧では、風は中心へ吹き込む。",
        "北半球では反時計回り。",
        "正解は『反時計回りに中心へ吹き込む』。"
      ],
      heredity: [
        "Aaの親は、Aまたはaを子に渡す。",
        "Aa×Aaでは、AA・Aa・Aa・aa。",
        "表れ方は丸：しわ＝3：1。"
      ],
      space: [
        "満月では、地球から月の明るい面が全部見える。",
        "太陽・地球・月の順にほぼ一直線。",
        "答えは『太陽・地球・月の順』。"
      ]
    };

    document.querySelectorAll(".obj").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        const spot = el.dataset.spot;
        handleSpot(spot);
      });
    });

    document.getElementById("emptyScene").addEventListener("click", () => {
      const messages = [
        "床や壁を見回したが、今のところ目立った手がかりはない。",
        "理科室の中にはいろいろな器具がある。気になる物を直接調べてみよう。",
        "机の上や棚の中に、まだ見つけていない手がかりがありそうだ。"
      ];
      setMessage(messages[Math.floor(Math.random() * messages.length)]);
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (!confirm("最初からやり直しますか？")) return;
      localStorage.removeItem("scienceEscapeRoomStateV2");
      state = structuredClone(defaultState);
      saveState();
      render();
      setMessage("最初から始める。まずは黒板を調べよう。");
    });

    document.getElementById("globalHintBtn").addEventListener("click", () => {
      openInfo(
        "blackboard",
        "今の目標",
        `
          <div class="question-box">
            <p><strong>現在の目標</strong></p>
            <p>${state.currentTarget}</p>
            <p>理科室の中で、まだ解決していない物を調べてみよう。</p>
          </div>
        `
      );
    });

    document.getElementById("closeModal").addEventListener("click", closeModal);
    document.getElementById("modalBack").addEventListener("click", (e) => {
      if (e.target.id === "modalBack") closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    document.getElementById("modalHintBtn").addEventListener("click", () => {
      showHint(state.activeSpot || "blackboard");
    });

    function handleSpot(spot) {
      if (state.clear && spot !== "door") {
        setMessage("すでに脱出成功している。もう一度遊ぶときは「最初から」を押そう。");
        return;
      }

      switch (spot) {
        case "blackboard": openBlackboard(); break;
        case "cylinder": openCylinder(); break;
        case "shelf": openShelf(); break;
        case "beaker": openBeaker(); break;
        case "burner": openBurner(); break;
        case "drawer": openDrawer(); break;
        case "microscope": openMicroscope(); break;
        case "compass": openCompass(); break;
        case "geology": openGeology(); break;
        case "circuit": openCircuit(); break;
        case "door": openDoor(); break;
        case "density": openDensity(); break;
        case "weather": openWeather(); break;
        case "heredity": openHeredity(); break;
        case "space": openSpace(); break;
      }
    }

    function openBlackboard() {
      state.solved.blackboard = true;
      state.currentTarget = "理科室の中を調べ、4つの数字を集めよう。まずはメスシリンダーが使えそうだ。";
      saveState();
      render();

      openInfo(
        "blackboard",
        "黒板",
        `
          <div class="question-box">
            <p>黒板には、先生の文字でこう書かれている。</p>
            <p><strong>「体積 → 色 → 倍率 → 電気」</strong></p>
            <p>理科室の中にある4つの数字を、この順番に並べると出口のロックが開くらしい。</p>
            <p>どこから調べるかは自由だが、実験器具に注目してみよう。</p>
          </div>
        `
      );
      setMessage("黒板から、最後の暗号の並び順がわかった。");
    }

    function openCylinder() {
      if (state.solved.cylinder) {
        openInfo(
          "cylinder",
          "メスシリンダー",
          `
            <div class="question-box">
              <p>液体の体積は <strong>38mL</strong> だった。</p>
              <p>体積の暗号には一の位を使うので、数字は <strong>8</strong>。</p>
            </div>
          `
        );
        return;
      }

      askQuestion({
        id: "cylinder",
        title: "メスシリンダー",
        question: `
          <p>メスシリンダーに液体が入っている。</p>
          <p>液面の一番低いところは、40mLより2目盛り下に見える。</p>
          <p><strong>液体の体積は何mLか。</strong></p>
        `,
        choices: ["36mL", "38mL", "40mL", "42mL"],
        answer: 1,
        onCorrect: () => {
          state.solved.cylinder = true;
          state.codes.volume = "8";
          addItem("小さな鍵");
          state.currentTarget = "薬品棚を開けられそうだ。鍵を使って中を調べよう。";
          saveState();
          render();
          setMessage("メスシリンダーから体積の数字8を得た。小さな鍵も見つけた。");
        },
        okText: "正解。38mLなので体積の暗号は一の位の8。さらに、小さな鍵を見つけた。",
        ngText: "違う。メスシリンダーは、液面の一番低いところを読む。"
      });
    }

    function openShelf() {
      if (!hasItem("小さな鍵")) {
        openInfo(
          "shelf",
          "薬品棚",
          `
            <div class="question-box">
              <p>棚には鍵がかかっている。</p>
              <p>無理やりは開かない。どこかに合う鍵があるはずだ。</p>
            </div>
          `
        );
        setMessage("薬品棚は鍵がないと開かない。");
        return;
      }

      if (state.solved.shelf) {
        openInfo(
          "shelf",
          "薬品棚",
          `
            <div class="question-box">
              <p>棚の中にはBTB溶液とメモがある。</p>
              <p><strong>青は3、緑は5、黄は7</strong></p>
              <p>色を数字に変えるためのメモのようだ。</p>
            </div>
          `
        );
        return;
      }

      state.solved.shelf = true;
      addItem("BTB溶液");
      state.currentTarget = "BTB溶液をビーカーに使って、色の数字を調べよう。";
      saveState();
      render();

      openInfo(
        "shelf",
        "薬品棚",
        `
          <div class="question-box">
            <p>小さな鍵で棚が開いた。</p>
            <p><strong>BTB溶液</strong>を手に入れた。</p>
            <p>さらに、メモが見つかった。</p>
            <p><strong>青は3、緑は5、黄は7</strong></p>
          </div>
        `
      );
      setMessage("薬品棚からBTB溶液と色の数字メモを手に入れた。");
    }

    function openBeaker() {
      if (!hasItem("BTB溶液")) {
        openInfo(
          "beaker",
          "ビーカー",
          `
            <div class="question-box">
              <p>透明な液体が入っている。</p>
              <p>何かを加えれば、性質がわかるかもしれない。</p>
            </div>
          `
        );
        setMessage("ビーカーの液体を調べるには、薬品が必要そうだ。");
        return;
      }

      if (state.solved.beaker) {
        openInfo(
          "beaker",
          "ビーカー",
          `
            <div class="question-box">
              <p>BTB溶液を入れると、液体は<strong>黄色</strong>になった。</p>
              <p>棚のメモより、黄色は <strong>7</strong>。</p>
            </div>
          `
        );
        return;
      }

      askQuestion({
        id: "beaker",
        title: "ビーカー",
        question: `
          <p>ビーカーの液体にBTB溶液を入れると、<strong>黄色</strong>になった。</p>
          <p><strong>この液体の性質として正しいものはどれか。</strong></p>
        `,
        choices: ["酸性", "中性", "アルカリ性", "金属"],
        answer: 0,
        onCorrect: () => {
          state.solved.beaker = true;
          state.codes.color = "7";
          state.currentTarget = "次は倍率の数字を探したい。ガスバーナーや顕微鏡を調べてみよう。";
          saveState();
          render();
          setMessage("ビーカーから色の数字7を得た。");

    /* 共通関数 */
    function askQuestion({ id, title, question, choices, answer, onCorrect, okText, ngText }) {
      openBase(id, title);

      const body = document.getElementById("modalBody");
      body.innerHTML = `
        <div class="question-box">${question}</div>
        <div class="choices" id="choicesBox"></div>
      `;

      const choicesBox = document.getElementById("choicesBox");
      choices.forEach((text, index) => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = text;
        btn.addEventListener("click", () => {
          const status = document.getElementById("modalStatus");
          if (index === answer) {
            onCorrect();
            status.className = "status-box ok show";
            status.textContent = okText;
            document.querySelectorAll(".choice-btn").forEach(b => {
              b.disabled = true;
              b.style.cursor = "default";
            });
          } else {
            status.className = "status-box ng show";
            status.textContent = ngText;
          }
        });
        choicesBox.appendChild(btn);
      });
    }

    function openInfo(id, title, html) {
      openBase(id, title);
      document.getElementById("modalBody").innerHTML = html;
    }

    function openBase(id, title) {
      state.activeSpot = id;
      saveState();

      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalBody").innerHTML = "";
      const hint = document.getElementById("modalHint");
      hint.className = "hint-box";
      hint.innerHTML = "";

      const status = document.getElementById("modalStatus");
      status.className = "status-box";
      status.textContent = "";

      document.getElementById("modalBack").classList.add("show");
    }

    function closeModal() {
      document.getElementById("modalBack").classList.remove("show");
    }

    function showHint(id) {
      const list = hints[id] || hints.blackboard;
      const current = state.hints[id] || 0;
      const index = Math.min(current, list.length - 1);
      const hint = document.getElementById("modalHint");
      hint.className = "hint-box show";
      hint.innerHTML = `<strong>ヒント${index + 1}</strong><br>${list[index]}`;

      state.hints[id] = Math.min(current + 1, list.length - 1);
      saveState();
    }

    function addItem(item) {
      if (!state.items.includes(item)) {
        state.items.push(item);
      }
    }

    function hasItem(item) {
      return state.items.includes(item);
    }

    function setMessage(text) {
      document.getElementById("messageBox").textContent = text;
    }

    function renderInventory() {
      const box = document.getElementById("inventoryBox");
      box.innerHTML = "";

      if (state.items.length === 0) {
        box.innerHTML = `<div class="empty">まだ何も持っていない。</div>`;
        return;
      }

      state.items.forEach(item => {
        const div = document.createElement("div");
        div.className = "item-card";
        div.innerHTML = `<strong>${item}</strong><br>${itemInfo[item] || "手に入れた道具。"}`;
        box.appendChild(div);
      });
    }

    function renderCodes() {
      document.getElementById("codeVolume").textContent = state.codes.volume || "?";
      document.getElementById("codeColor").textContent = state.codes.color || "?";
      document.getElementById("codeMicro").textContent = state.codes.micro || "?";
      document.getElementById("codeElectric").textContent = state.codes.electric || "?";
    }

    function renderObjects() {
      document.querySelectorAll(".obj").forEach(obj => {
        const spot = obj.dataset.spot;
        obj.classList.remove("solved", "locked");
        const mark = obj.querySelector(".mark");
        if (!mark) return;

        if (state.solved[spot]) {
          obj.classList.add("solved");
          mark.textContent = "✓";
          return;
        }

        if (spot === "shelf" && !hasItem("小さな鍵")) {
          obj.classList.add("locked");
          mark.textContent = "鍵";
          return;
        }

        if (spot === "beaker" && !hasItem("BTB溶液")) {
          obj.classList.add("locked");
          mark.textContent = "…";
          return;
        }

        if (spot === "microscope" && !hasItem("接眼レンズ")) {
          obj.classList.add("locked");
          mark.textContent = "欠";
          return;
        }

        if (spot === "circuit" && (!hasItem("導線") || !hasItem("電池"))) {
          obj.classList.add("locked");
          mark.textContent = "準";
          return;
        }

        if (spot === "door") {
          mark.textContent = "鍵";
          return;
        }

        if (spot === "drawer") {
          if (!state.solved.burner) {
            obj.classList.add("locked");
            mark.textContent = "閉";
          } else {
            mark.textContent = "?";
          }
          return;
        }

        if (["density", "weather", "heredity", "space"].includes(spot)) {
          mark.textContent = "+";
          return;
        }

        mark.textContent = "?";
      });

      const drawer = document.getElementById("drawerObj");
      if (state.solved.burner && !state.solved.drawer) {
        drawer.classList.remove("hidden-hotspot");
      } else if (!state.solved.burner) {
        drawer.classList.add("hidden-hotspot");
      }
    }

    function render() {
      renderInventory();
      renderCodes();
      renderObjects();
      renderProgress();
    }

    function saveState() {
      localStorage.setItem("scienceEscapeRoomStateV2", JSON.stringify(state));
    }

    function loadState() {
      const raw = localStorage.getItem("scienceEscapeRoomStateV2");
      if (!raw) return structuredClone(defaultState);

      try {
        const parsed = JSON.parse(raw);
        return {
          ...structuredClone(defaultState),
          ...parsed,
          items: parsed.items || [],
          solved: parsed.solved || {},
          codes: parsed.codes || {},
          hints: parsed.hints || {}
        };
      } catch {
        return structuredClone(defaultState);
      }
    }

    render();
  </script>
</body>
</html>
