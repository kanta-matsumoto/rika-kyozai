<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>理科室からの脱出</title>

  <style>
    :root {
      --bg: #f3efe3;
      --paper: #fffdf6;
      --ink: #1f2a2e;
      --sub: #687477;
      --green: #2f6f5e;
      --dark-green: #244f45;
      --blue: #2f5f83;
      --red: #a3463a;
      --yellow: #e0bc4f;
      --line: #d8cfbd;
      --shadow: 0 16px 36px rgba(30, 35, 38, 0.14);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", sans-serif;
      background:
        linear-gradient(rgba(243, 239, 227, 0.94), rgba(243, 239, 227, 0.94)),
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 38px,
          rgba(0,0,0,0.025) 39px
        );
      color: var(--ink);
    }

    header {
      background: #243b35;
      color: white;
      padding: 18px 20px;
      border-bottom: 6px solid #c9a941;
    }

    .header-inner {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: 0.04em;
    }

    .header-note {
      margin: 6px 0 0;
      color: #d9e5de;
      font-size: 14px;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      font-family: inherit;
    }

    .small-btn {
      border: none;
      border-radius: 999px;
      background: #f6f0d7;
      color: #1f2a2e;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 4px 0 rgba(0,0,0,0.18);
    }

    .small-btn:hover {
      transform: translateY(1px);
      box-shadow: 0 3px 0 rgba(0,0,0,0.18);
    }

    main {
      max-width: 1180px;
      margin: 22px auto;
      padding: 0 16px 40px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 18px;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    .room-wrap,
    .side-panel,
    .message-box {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .room-wrap {
      padding: 16px;
    }

    .room-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .room-title h2 {
      margin: 0;
      font-size: 20px;
    }

    .progress {
      font-size: 14px;
      color: var(--sub);
      font-weight: 700;
    }

    .room {
      min-height: 560px;
      border-radius: 16px;
      padding: 16px;
      background:
        linear-gradient(to bottom, #e9dfc8 0 54%, #d6c4a4 54% 100%);
      border: 1px solid #cfc1a7;
      position: relative;
      overflow: hidden;
    }

    .blackboard-band {
      background: #263f38;
      color: #eef7ef;
      border: 6px solid #8a6c3b;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.25);
    }

    .blackboard-band strong {
      color: #ffe27a;
    }

    .spots {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 12px;
    }

    @media (max-width: 720px) {
      .spots {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
    }

    .spot {
      min-height: 108px;
      border: 2px solid #b8aa91;
      border-radius: 14px;
      background: rgba(255, 253, 246, 0.92);
      cursor: pointer;
      text-align: left;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: 0.16s ease;
      position: relative;
    }

    .spot:hover {
      transform: translateY(-2px);
      border-color: var(--green);
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
    }

    .spot.solved {
      background: #eef7ee;
      border-color: #77a97f;
    }

    .spot.locked {
      background: #f7f2ea;
      color: #7b7268;
      border-style: dashed;
    }

    .spot-name {
      font-size: 16px;
      font-weight: 800;
    }

    .spot-desc {
      font-size: 12px;
      color: var(--sub);
      line-height: 1.5;
      margin-top: 4px;
    }

    .badge {
      display: inline-block;
      width: fit-content;
      font-size: 11px;
      font-weight: 800;
      color: white;
      background: var(--blue);
      border-radius: 999px;
      padding: 4px 8px;
      margin-top: 10px;
    }

    .spot.solved .badge {
      background: var(--green);
    }

    .spot.locked .badge {
      background: #8d7e67;
    }

    .side-panel {
      padding: 16px;
      height: fit-content;
      position: sticky;
      top: 12px;
    }

    .side-panel h2 {
      font-size: 18px;
      margin: 0 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    .objective {
      background: #f6f0d7;
      border: 1px solid #e0cf88;
      border-radius: 12px;
      padding: 12px;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .inventory {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .item {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      font-size: 14px;
    }

    .empty {
      color: var(--sub);
      font-size: 14px;
      line-height: 1.6;
    }

    .code-list {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .code-cell {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      text-align: center;
      padding: 10px 4px;
    }

    .code-cell small {
      display: block;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .code-cell strong {
      font-size: 22px;
    }

    .message-box {
      margin-top: 16px;
      padding: 14px;
      line-height: 1.7;
      min-height: 70px;
    }

    .message-box strong {
      color: var(--green);
    }

    .modal-back {
      position: fixed;
      inset: 0;
      background: rgba(15, 20, 22, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }

    .modal-back.show {
      display: flex;
    }

    .modal {
      width: min(720px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: var(--paper);
      border-radius: 20px;
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px rgba(0,0,0,0.28);
      padding: 18px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 14px;
    }

    .modal h2 {
      margin: 0;
      font-size: 22px;
    }

    .close-btn {
      border: none;
      background: #e8e0d1;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 800;
    }

    .question {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      line-height: 1.8;
      margin-bottom: 12px;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice-btn,
    .action-btn {
      border: 1px solid #b8aa91;
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      font-size: 15px;
      line-height: 1.5;
    }

    .choice-btn:hover,
    .action-btn:hover {
      border-color: var(--green);
      background: #f4fbf4;
    }

    .action-btn {
      background: var(--green);
      color: white;
      font-weight: 800;
      text-align: center;
      border: none;
      margin-top: 12px;
    }

    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      line-height: 1.7;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.ok {
      background: #edf7ed;
      border: 1px solid #98c49b;
    }

    .status.ng {
      background: #fff0ed;
      border: 1px solid #d99a90;
    }

    .hint-box {
      margin-top: 12px;
      background: #f6f0d7;
      border: 1px solid #e0cf88;
      border-radius: 12px;
      padding: 12px;
      line-height: 1.7;
      display: none;
    }

    .hint-box.show {
      display: block;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .lock-input {
      font-size: 24px;
      letter-spacing: 0.2em;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      width: 180px;
      background: #fff;
    }

    .clear-screen {
      background: #edf7ed;
      border: 1px solid #98c49b;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.8;
    }

    .review-list {
      margin: 10px 0 0;
      padding-left: 1.2em;
    }

    .review-list li {
      margin-bottom: 6px;
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>理科室からの脱出</h1>
        <p class="header-note">理科室を調べ、観察・計算・推理でドアの暗号を解け。</p>
      </div>
      <div class="top-buttons">
        <button class="small-btn" id="hintBtn">今のヒント</button>
        <button class="small-btn" id="resetBtn">最初から</button>
      </div>
    </div>
  </header>

  <main>
    <section>
      <div class="room-wrap">
        <div class="room-title">
          <h2>理科室</h2>
          <div class="progress" id="progressText">進行状況を読み込み中...</div>
        </div>

        <div class="room">
          <div class="blackboard-band">
            <strong>黒板の文字：</strong>
            「体積 → 色 → 倍率 → 電気」の順に数字を並べよ。
          </div>

          <div class="spots">
            <button class="spot" data-spot="blackboard">
              <span>
                <span class="spot-name">黒板</span>
                <span class="spot-desc">最初の指示と、最終暗号の並び順が書かれている。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="cylinder">
              <span>
                <span class="spot-name">メスシリンダー</span>
                <span class="spot-desc">液体が入っている。目盛りを読む必要がありそうだ。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="shelf">
              <span>
                <span class="spot-name">薬品棚</span>
                <span class="spot-desc">鍵がかかっている。中に薬品がありそうだ。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="beaker">
              <span>
                <span class="spot-name">ビーカー</span>
                <span class="spot-desc">透明な液体が入っている。性質を調べられるかもしれない。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="burner">
              <span>
                <span class="spot-name">ガスバーナー</span>
                <span class="spot-desc">正しい使い方を確認すると、引き出しが開きそうだ。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="microscope">
              <span>
                <span class="spot-name">顕微鏡</span>
                <span class="spot-desc">レンズが外れている。倍率の計算が関係していそうだ。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="compass">
              <span>
                <span class="spot-name">方位磁針</span>
                <span class="spot-desc">針が北東を指している。棚のボタンと関係がありそうだ。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="geology">
              <span>
                <span class="spot-name">地層ポスター</span>
                <span class="spot-desc">地層の上下関係を読むと、隠し場所がわかりそうだ。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="circuit">
              <span>
                <span class="spot-name">回路装置</span>
                <span class="spot-desc">電池と導線があれば、ライトをつけられそうだ。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="density">
              <span>
                <span class="spot-name">金属片</span>
                <span class="spot-desc">質量と体積のメモがある。密度を計算できそうだ。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="weather">
              <span>
                <span class="spot-name">天気図カード</span>
                <span class="spot-desc">低気圧と風の向きに関する追加ミッション。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="heredity">
              <span>
                <span class="spot-name">遺伝カード</span>
                <span class="spot-desc">丸い種子としわの種子の組み合わせを考える。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="space">
              <span>
                <span class="spot-name">天体模型</span>
                <span class="spot-desc">太陽・地球・月の位置関係を考える追加ミッション。</span>
              </span>
              <span class="badge"></span>
            </button>

            <button class="spot" data-spot="door">
              <span>
                <span class="spot-name">出口のドア</span>
                <span class="spot-desc">4桁のロックがある。暗号を入力すれば脱出できる。</span>
              </span>
              <span class="badge"></span>
            </button>
          </div>
        </div>
      </div>

      <div class="message-box" id="messageBox">
        まずは黒板を調べよう。理科室の中に、脱出に必要な数字が隠されている。
      </div>
    </section>

    <aside class="side-panel">
      <h2>現在の目標</h2>
      <div class="objective" id="objectiveBox">
        黒板を調べて、暗号のルールを確認しよう。
      </div>

      <h2>持ち物</h2>
      <div class="inventory" id="inventoryBox"></div>

      <h2>暗号メモ</h2>
      <div class="code-list">
        <div class="code-cell">
          <small>体積</small>
          <strong id="codeVolume">?</strong>
        </div>
        <div class="code-cell">
          <small>色</small>
          <strong id="codeColor">?</strong>
        </div>
        <div class="code-cell">
          <small>倍率</small>
          <strong id="codeMicro">?</strong>
        </div>
        <div class="code-cell">
          <small>電気</small>
          <strong id="codeElectric">?</strong>
        </div>
      </div>
    </aside>
  </main>

  <div class="modal-back" id="modalBack">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalTitle">タイトル</h2>
        <button class="close-btn" id="closeModal">×</button>
      </div>
      <div id="modalBody"></div>
      <div class="hint-box" id="modalHint"></div>
      <div class="status" id="modalStatus"></div>
    </div>
  </div>

  <script>
    const FINAL_CODE = "8714";

    const defaultState = {
      items: [],
      solved: {},
      codes: {},
      hintIndex: {},
      currentTarget: "黒板を調べて、暗号のルールを確認しよう。",
      clear: false
    };

    let state = loadState();

    const itemInfo = {
      "小さな鍵": "薬品棚を開けるための鍵。",
      "BTB溶液": "酸性・中性・アルカリ性を色で調べる薬品。",
      "接眼レンズ": "顕微鏡に取り付けるレンズ。",
      "導線": "回路をつなぐための線。",
      "電池": "回路に電流を流すための電源。"
    };

    const hints = {
      blackboard: [
        "黒板には、最後の暗号の並び順が書かれている。",
        "体積、色、倍率、電気の4つの数字を集める。",
        "集めた数字を、黒板の順番でドアに入力する。"
      ],
      cylinder: [
        "メスシリンダーは、目線を液面と同じ高さにして読む。",
        "液面は少しへこんで見える。読むのは一番低いところ。",
        "この液体は38mL。暗号には一の位を使う。"
      ],
      shelf: [
        "薬品棚には鍵がかかっている。",
        "鍵は、最初に解ける測定の謎に関係している。",
        "メスシリンダーを調べてみよう。"
      ],
      beaker: [
        "透明な液体の性質を調べるには、薬品が必要。",
        "BTB溶液は、酸性で黄色、中性で緑色、アルカリ性で青色になる。",
        "黄色になったら、薬品棚のメモの『黄』に対応する数字を見る。"
      ],
      burner: [
        "ガスバーナーは、安全な手順で使う必要がある。",
        "マッチに火をつけてから、ガス調節ねじを少し開く。",
        "元栓を開く → マッチに火 → ガス調節ねじ → 空気調節ねじ、の順に考える。"
      ],
      microscope: [
        "顕微鏡は、接眼レンズと対物レンズの倍率をかける。",
        "接眼レンズ10倍、対物レンズ15倍なら、10×15。",
        "150倍なので、暗号には百の位の1を使う。"
      ],
      compass: [
        "方位磁針のN極は北を指す。",
        "北東は、北と東の間の方角。",

      ],
      geology: [
        "地層は、ふつう下にあるものほど古い。",
        "ポスターの一番下の地層に注目する。",
        "一番古い地層の裏に電池が隠されている。"
      ],
      circuit: [
        "電流計は、電流の通り道に入れる。",
        "電圧計は、測りたい部分をはさむようにつなぐ。",
        "電流計は直列、電圧計は並列。"
      ],
      door: [
        "ドアの暗号は4桁。",
        "黒板の順番は、体積 → 色 → 倍率 → 電気。",
        "暗号メモの4つの数字を左から順に入力する。"
      ],
      density: [
        "密度は、質量÷体積で求める。",
        "54g ÷ 20cm³ を計算する。",
        "密度は2.7g/cm³。アルミニウムに近い。"
      ],
      weather: [
        "日本付近の低気圧では、風は中心に向かって吹き込む。",
        "北半球では、低気圧のまわりの風は反時計回りに吹き込む。",
        "答えは反時計回り。"
      ],
      heredity: [
        "Aaの親は、Aかaのどちらかを子に渡す。",
        "Aa×Aaでは、AA、Aa、Aa、aaの4通りになる。",
        "表れ方は、丸：しわ＝3：1。"
      ],
      space: [
        "満月は、太陽・地球・月の順にほぼ一直線になるときに見える。",
        "地球から見ると、月の太陽に照らされた面が全部見える。",
        "満月では、地球が太陽と月の間にある。"
      ]
    };

    const spotNames = {
      blackboard: "黒板",
      cylinder: "メスシリンダー",
      shelf: "薬品棚",
      beaker: "ビーカー",
      burner: "ガスバーナー",
      microscope: "顕微鏡",
      compass: "方位磁針",
      geology: "地層ポスター",
      circuit: "回路装置",
      density: "金属片",
      weather: "天気図カード",
      heredity: "遺伝カード",
      space: "天体模型",
      door: "出口のドア"
    };

    const requiredItems = {
      shelf: ["小さな鍵"],
      beaker: ["BTB溶液"],
      microscope: ["接眼レンズ"],
      circuit: ["導線", "電池"]
    };

    document.querySelectorAll(".spot").forEach(button => {
      button.addEventListener("click", () => {
        const spot = button.dataset.spot;
        handleSpot(spot);
      });
    });

    document.getElementById("closeModal").addEventListener("click", closeModal);
    document.getElementById("modalBack").addEventListener("click", event => {

      if (state.clear && spot !== "door") {
        setMessage("すでに脱出成功している。もう一度遊ぶ場合は「最初から」を押そう。");
        return;
      }

      switch (spot) {
        case "blackboard":
          openBlackboard();
          break;
        case "cylinder":
          openCylinder();
          break;
        case "shelf":
          openShelf();
          break;
        case "beaker":
          openBeaker();
          break;
        case "burner":
          openBurner();
          break;
        case "microscope":
          openMicroscope();
          break;
        case "compass":
          openCompass();
          break;
        case "geology":
          openGeology();
          break;
        case "circuit":
          openCircuit();
          break;
        case "density":
          openDensity();
          break;
        case "weather":
          openWeather();
          break;
        case "heredity":
          openHeredity();
          break;
        case "space":
          openSpace();
          break;
        case "door":
          openDoor();
          break;

        },
        correctMessage: "正解。満月では、太陽・地球・月の順にほぼ一直線になる。",
        wrongMessage: "違う。満月では、地球から見て月の明るい面がほぼ全部見える。"
      });
    }

    function openDoor() {
      const currentCode =
        (state.codes.volume || "?") +
        (state.codes.color || "?") +
        (state.codes.micro || "?") +
        (state.codes.electric || "?");

      openInfo(
        "door",
        "出口のドア",
        `
          <div class="question">
            <p>ドアには4桁のロックがある。</p>
            <p>黒板の順番は、<strong>体積 → 色 → 倍率 → 電気</strong>。</p>
            <p>現在の暗号メモ：<strong>${currentCode}</strong></p>
            <div class="input-row">
              <input class="lock-input" id="doorInput" type="text" maxlength="4" inputmode="numeric" placeholder="4桁">
              <button class="action-btn" id="doorSubmit">ロックを開ける</button>
            </div>
          </div>
        `
      );

      setTimeout(() => {
        const input = document.getElementById("doorInput");
        const submit = document.getElementById("doorSubmit");
        input.focus();

        submit.addEventListener("click", checkDoor);
        input.addEventListener("keydown", event => {
          if (event.key === "Enter") checkDoor();
        });
      }, 0);
    }

    function checkDoor() {
      const input = document.getElementById("doorInput");
      const value = input.value.trim();
      const status = document.getElementById("modalStatus");

      if (value === FINAL_CODE) {
        state.clear = true;
        state.solved.door = true;
        state.currentTarget = "脱出成功。振り返りで、使った理科知識を確認しよう。";
        saveState();
        render();

        document.getElementById("modalBody").innerHTML = `
          <div class="clear-screen">
            <h2>脱出成功</h2>
            <p>ドアのロックが開いた。</p>
            <p>今回の暗号は、黒板の順に並べて <strong>${FINAL_CODE}</strong> だった。</p>

            <p><strong>使った理科知識</strong></p>
            <ul class="review-list">
              <li>メスシリンダーは、液面の一番低いところを読む。</li>
              <li>BTB溶液は、酸性で黄色、中性で緑色、アルカリ性で青色になる。</li>
              <li>顕微鏡の倍率は、接眼レンズの倍率×対物レンズの倍率で求める。</li>
              <li>電流計は直列、電圧計は並列につなぐ。</li>
              <li>方位磁針は北を基準に方角を考える。</li>
              <li>ふつう、下にある地層ほど古い。</li>
            </ul>
          </div>
        `;
        status.className = "status";
        status.textContent = "";
        setMessage("脱出成功。最後に、どの場面でどの理科知識を使ったか振り返ろう。");
      } else {
        status.className = "status ng show";
        status.textContent = "番号が違う。黒板の順番は「体積 → 色 → 倍率 → 電気」。暗号メモをもう一度確認しよう。";
      }
    }

    function askQuestion(config) {
      openBase(config.id, config.title);

      const body = document.getElementById("modalBody");
      body.innerHTML = `
        <div class="question">${config.question}</div>
        <div class="choices" id="choicesBox"></div>
      `;

      const choicesBox = document.getElementById("choicesBox");

      config.choices.forEach((choice, index) => {
        const button = document.createElement("button");
        button.className = "choice-btn";
        button.textContent = choice;

        button.addEventListener("click", () => {
          const status = document.getElementById("modalStatus");

          if (index === config.answer) {
            config.correct();
            status.className = "status ok show";
            status.textContent = config.correctMessage;
            document.querySelectorAll(".choice-btn").forEach(btn => {
              btn.disabled = true;
              btn.style.cursor = "default";
            });
          } else {
            status.className = "status ng show";
            status.textContent = config.wrongMessage;
          }
        });

        choicesBox.appendChild(button);
      });
    }

    function openInfo(id, title, html) {
      openBase(id, title);
      document.getElementById("modalBody").innerHTML = html;
    }

    function openBase(id, title) {
      state.activeSpot = id;
      saveState();

      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalBody").innerHTML = "";
      document.getElementById("modalStatus").className = "status";
      document.getElementById("modalStatus").textContent = "";

      const hintBox = document.getElementById("modalHint");
      hintBox.className = "hint-box";
      hintBox.textContent = "";

      const modalBack = document.getElementById("modalBack");
      modalBack.classList.add("show");
    }

    function closeModal() {
      document.getElementById("modalBack").classList.remove("show");
    }

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeModal();
    });

    document.getElementById("modalBack").addEventListener("dblclick", () => {
      const id = state.activeSpot || "blackboard";
      showModalHint(id);
    });

    document.getElementById("hintBtn").addEventListener("contextmenu", event => {
      event.preventDefault();
    });

    document.addEventListener("click", event => {
      if (event.target.id === "hintBtn") return;
    });

    document.getElementById("modalBack").addEventListener("click", event => {
      if (event.target.classList.contains("modal")) {
        const id = state.activeSpot || "blackboard";
        showModalHint(id);
      }
    });

    function showModalHint(id) {
      const list = hints[id] || hints.blackboard;
      const current = state.hintIndex[id] || 0;
      const next = Math.min(current, list.length - 1);

      const hintBox = document.getElementById("modalHint");
      hintBox.className = "hint-box show";
      hintBox.innerHTML = `<strong>ヒント${next + 1}</strong><br>${list[next]}`;

      state.hintIndex[id] = Math.min(current + 1, list.length - 1);
      saveState();
    }

    function addItem(name) {
      if (!state.items.includes(name)) {
        state.items.push(name);
      }
    }

    function hasItem(name) {
      return state.items.includes(name);
    }

    function setMessage(text) {
      document.getElementById("messageBox").innerHTML = text;
    }

    function render() {
      renderInventory();
      renderCodes();
      renderSpots();

      const solvedMain = [
        "cylinder",
        "shelf",
        "beaker",
        "burner",
        "microscope",
        "compass",
        "geology",
        "circuit"
      ].filter(key => state.solved[key]).length;

      document.getElementById("progressText").textContent =
        `メイン進行 ${solvedMain}/8`;

      document.getElementById("objectiveBox").textContent = state.currentTarget;
    }

    function renderInventory() {
      const box = document.getElementById("inventoryBox");
      box.innerHTML = "";

      if (state.items.length === 0) {
        box.innerHTML = `<div class="empty">まだ何も持っていない。</div>`;
        return;
      }

      state.items.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<strong>${item}</strong><br><span>${itemInfo[item] || "手に入れた道具。"}</span>`;
        box.appendChild(div);
      });
    }

    function renderCodes() {
      document.getElementById("codeVolume").textContent = state.codes.volume || "?";
      document.getElementById("codeColor").textContent = state.codes.color || "?";
      document.getElementById("codeMicro").textContent = state.codes.micro || "?";
      document.getElementById("codeElectric").textContent = state.codes.electric || "?";
    }

    function renderSpots() {
      document.querySelectorAll(".spot").forEach(button => {
        const spot = button.dataset.spot;
        const badge = button.querySelector(".badge");

        button.classList.remove("solved", "locked");

        if (state.solved[spot]) {
          button.classList.add("solved");
          badge.textContent = "解決済み";
          return;
        }

        const needs = requiredItems[spot] || [];
        const locked = needs.some(item => !hasItem(item));

        if (locked) {
          button.classList.add("locked");
          badge.textContent = "道具不足";
        } else if (spot === "door") {
          badge.textContent = "ロック";
        } else {
          badge.textContent = "調べる";
        }
      });
    }

    function saveState() {
      localStorage.setItem("rikaEscapeState", JSON.stringify(state));
    }

    function loadState() {
      const saved = localStorage.getItem("rikaEscapeState");
      if (!saved) return structuredClone(defaultState);

      try {
        const parsed = JSON.parse(saved);
        return {
          ...structuredClone(defaultState),
          ...parsed,
          items: parsed.items || [],
          solved: parsed.solved || {},
          codes: parsed.codes || {},
          hintIndex: parsed.hintIndex || {}
        };
      } catch {
        return structuredClone(defaultState);
      }
    }

    render();
  </script>
</body>
</html>
